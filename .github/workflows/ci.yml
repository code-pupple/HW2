name: CI to Docker Hub

# 액션 실행 트리거 속성 설정
on:
  push:
    branches:
      - main
    # paths 필터를 제거하여 루트 레포지토리의 어떤 파일이든 변경되면 작동하도록 수정했습니다.

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: . # 현재 디렉토리가 루트이므로 상대경로(.)로 수정
          file: ./Dockerfile # 파일 위치도 상대경로로 수정
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mushroom-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mushroom-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mushroom-api:buildcache,mode=max
